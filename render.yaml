services:
  # LearnRights Backend (FastAPI)
  - type: web
    name: learn-rights-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_AI_API_KEY
        sync: false
    rootDir: learn-rights-python

staticSites:
  - name: learn-rights-frontend
    buildCommand: npm install && npm run build
    publishDir: build
    rootDir: learn-rights-frontend
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: learn-rights-backend
          property: url
